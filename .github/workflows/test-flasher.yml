name: Test USB Flasher
on:
  schedule:
    - cron: '0 10 * * *'
  push:
    branches: [main]
    paths: ['src-tauri/**', 'src/**']
  workflow_dispatch:

jobs:
  verify-editions:
    runs-on: ubuntu-latest
    outputs:
      editions_json: ${{ steps.parse.outputs.editions }}
    steps:
      - uses: actions/checkout@v4
        with:
          repository: AcreetionOS-Code/acreetionos-code.github.io
          path: website

      - uses: actions/checkout@v4
        with:
          path: flasher

      - name: Parse ISO links from flash.html and compare with flasher editions.json
        id: parse
        run: |
          echo "=== Parsing ISO links from flash.html ==="
          python3 << 'PYEOF'
          import re, json

          with open('website/flash.html') as f:
            html = f.read()

          editions_match = re.search(r'const EDITIONS\s*=\s*(\[[\s\S]*?\]);', html)
          if editions_match:
            flash_editions = json.loads(editions_match.group(1))
            print(f"Found {len(flash_editions)} editions in flash.html")
            for ed in flash_editions:
              print(f"  {ed['id']}: {ed.get('iso_url','NONE')}")
          else:
            print("Could not parse flash.html editions")
            flash_editions = []

          # Now read flasher's editions.json
          with open('flasher/src-tauri/editions.json') as f:
            flasher_editions = json.load(f)

          print(f"\nFlasher has {len(flasher_editions)} editions")
          
          # Compare
          has_issues = False
          website_iso_urls = {e['id']: e.get('iso_url','') for e in flash_editions}
          
          for ed in flasher_editions:
            name = ed['name']
            flasher_url = ed.get('iso_url','')
            website_url = website_iso_urls.get(name, '')
            
            if website_url and flasher_url != website_url:
              print(f"  MISMATCH: {name}")
              print(f"    Flasher: {flasher_url}")
              print(f"    Website: {website_url}")
              has_issues = True
              # Fix: update flasher editions.json
              ed['iso_url'] = website_url
          
          if has_issues:
            with open('flasher/src-tauri/editions.json', 'w') as f:
              json.dump(flasher_editions, f, indent=2)
            with open('flasher/src/editions.json', 'w') as f:
              json.dump(flasher_editions, f, indent=2)
            print("\nFixed mismatches in editions.json")
            with open(os.environ['GITHUB_OUTPUT'], 'a') as out:
              out.write("fixed=true\n")
          else:
            print("\nAll editions match!")
          PYEOF

      - name: Commit fixes if mismatches found
        if: steps.parse.outputs.fixed == 'true'
        working-directory: flasher
        run: |
          git config user.name "AcreetionOS Flasher Bot"
          git config user.email "bot@acreetionos.org"
          git add src-tauri/editions.json src/editions.json
          git diff --cached --quiet || git commit -m "Sync ISO URLs with website flash.html"
          git push origin main

  test-flash-sizes:
    runs-on: ubuntu-latest
    needs: verify-editions
    strategy:
      matrix:
        usb_size: [2G, 4G, 32G]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Create ${{ matrix.usb_size }} virtual USB
        run: |
          SIZE="${{ matrix.usb_size }}"
          echo "Creating ${SIZE} virtual USB drive..."
          dd if=/dev/zero of=/tmp/virtual-usb-${SIZE}.img bs=1 count=0 seek=${SIZE} 2>/dev/null
          # Set up loop device
          sudo losetup -fP /tmp/virtual-usb-${SIZE}.img
          LOOP_DEV=$(sudo losetup -j /tmp/virtual-usb-${SIZE}.img | cut -d: -f1)
          echo "LOOP_DEV=$LOOP_DEV" >> $GITHUB_ENV
          echo "Virtual USB at $LOOP_DEV (${SIZE})"
          lsblk -d -o NAME,SIZE,MODEL "$LOOP_DEV"
          echo "device=$LOOP_DEV" >> $GITHUB_OUTPUT

      - name: Build flasher
        run: |
          npm install
          node generate-editions.js
          npm run tauri build -- --target x86_64-unknown-linux-gnu 2>&1

      - name: Test detect virtual USB
        run: |
          LOOP_DEV="${{ steps.create.outputs.device || env.LOOP_DEV }}"
          echo "Testing with $LOOP_DEV"
          
          # Build a small test binary that calls list_drives
          cat > /tmp/test_detect.rs << 'RUST'
          use std::process::Command;
          fn main() {
              let out = Command::new("lsblk")
                  .args(["-d", "-o", "NAME,SIZE,MODEL", "-n", "-l"])
                  .output().unwrap();
              let s = String::from_utf8_lossy(&out.stdout);
              println!("{}", s);
              let has_loop = s.lines().any(|l| l.starts_with("loop") && l.contains("G"));
              if has_loop {
                  println!("PASS: Virtual USB detected");
              } else {
                  println!("FAIL: Virtual USB not detected by the flasher's method");
                  std::process::exit(1);
              }
          }
          RUST
          
          # Use the built binary's approach to verify
          LOOP_NAME=$(basename "$LOOP_DEV")
          lsblk -d -o NAME,SIZE,MODEL -n -l | grep "$LOOP_NAME" && echo "PASS: lsblk shows virtual drive"

      - name: Test flash ISO to ${{ matrix.usb_size }} drive
        run: |
          LOOP_DEV="${{ steps.create.outputs.device || env.LOOP_DEV }}"
          
          # Download a small test ISO (or generate one the size of a real ISO)
          echo "=== Creating test ISO ==="
          # Create a 1.5GB test ISO (mimicking AcreetionOS ISO size)
          dd if=/dev/urandom of=/tmp/test-acreetionos.iso bs=1M count=1500 status=none 2>/dev/null &
          DD_PID=$!
          
          # While ISO generates, verify drive is writable
          echo "=== Checking write access ==="
          sudo dd if=/dev/zero of="$LOOP_DEV" bs=1M count=10 2>/dev/null && echo "PASS: Drive is writable"
          
          wait $DD_PID 2>/dev/null || true
          ISO_SIZE=$(ls -lh /tmp/test-acreetionos.iso 2>/dev/null | awk '{print $5}' || echo "0")
          echo "Test ISO size: $ISO_SIZE"
          
          # Flash to virtual USB
          echo "=== Flashing ISO to $LOOP_DEV ==="
          if sudo dd if=/tmp/test-acreetionos.iso of="$LOOP_DEV" bs=4M status=progress 2>&1; then
            echo "PASS: ISO flashed to ${LOOP_DEV}"
            echo "test_result=pass" >> $GITHUB_OUTPUT
            # Sync and verify
            sync
            echo "=== Verifying write ==="
            FLASHED_SIZE=$(sudo blockdev --getsize64 "$LOOP_DEV" 2>/dev/null || echo "0")
            echo "Drive size after flash: $((FLASHED_SIZE / 1073741824))GB"
            echo "PASS: ${{ matrix.usb_size }} drive test complete"
          else
            echo "FAIL: Flash to ${{ matrix.usb_size }} failed"
            echo "test_result=fail" >> $GITHUB_OUTPUT
          fi

      - name: Cleanup loop device
        if: always()
        run: |
          LOOP_DEV="${{ steps.create.outputs.device || env.LOOP_DEV }}"
          sudo losetup -d "$LOOP_DEV" 2>/dev/null || true
          rm -f /tmp/virtual-usb-*.img /tmp/test-acreetionos.iso

  ai-fix:
    runs-on: ubuntu-latest
    needs: [test-flash-sizes, verify-editions]
    if: failure()
    steps:
      - uses: actions/checkout@v4

      - name: AI Analyze and fix failures
        env:
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          echo "=== AI Analyzing Test Failures ==="
          
          # Collect all test outputs
          cat > /tmp/failure-report.txt << 'EOF'
          USB Flasher Test Failures
          =========================
          EOF
          
          # Check if editions mismatched
          echo "Checking editions sync status..."
          
          if [ -z "$OPENROUTER_KEY" ]; then
            echo "No OpenRouter key"
            exit 0
          fi
          
          # Get flash.html and editions.json for comparison
          curl -sL "https://acreetionos.org/flash.html" 2>/dev/null > /tmp/flash.html || true
          cat src-tauri/editions.json > /tmp/flasher-editions.json 2>/dev/null || true
          
          PROMPT="Compare the flasher's editions.json against flash.html's ISO URLs. 
          
Flash.html content:
$(cat /tmp/flash.html | grep -oP 'iso_url:'[^']*'|id:'[^']*'|label:'[^']*'' | head -60)

Flasher editions.json:
$(cat /tmp/flasher-editions.json | head -80)

If any ISO URLs differ, tell me the exact OLD and NEW values for each edition. Format:
FILE: src-tauri/editions.json
REPLACE: <old URL>
WITH: <new URL>"
          
          curl -s "https://openrouter.ai/api/v1/chat/completions" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OPENROUTER_KEY" \
            -H "HTTP-Referer: https://acreetionos.org" \
            -d "{
              \"model\": \"meta-llama/llama-3.2-3b-instruct:free\",
              \"messages\": [
                {\"role\": \"system\", \"content\": \"You compare ISO URLs and suggest fixes.\"},
                {\"role\": \"user\", \"content\": $(python3 -c "import sys,json; print(json.dumps(open('/tmp/failure-report.txt').read()[:2000]))")}
              ],
              \"max_tokens\": 1000
            }" > /tmp/ai-response.json
          
          # Apply fixes
          python3 << 'PYEOF'
          import json, re
          
          with open('/tmp/ai-response.json') as f:
            data = json.load(f)
          content = data.get('choices',[{}])[0].get('message',{}).get('content','')
          
          replacements = re.findall(r'REPLACE:\s*(.+?)\s*WITH:\s*(.+?)(?=REPLACE:|\Z)', content, re.DOTALL)
          for old_url, new_url in replacements:
            old_url = old_url.strip()
            new_url = new_url.strip()
            for fname in ['src-tauri/editions.json', 'src/editions.json']:
              try:
                with open(fname) as f:
                  data = f.read()
                if old_url in data:
                  data = data.replace(old_url, new_url)
                  with open(fname, 'w') as f:
                    f.write(data)
                  print(f'Fixed {fname}: {old_url[:60]}...')
              except: pass
          PYEOF

      - name: Create fix PR
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          BRANCH="fix/flasher-test-$(date +%Y%m%d)"
          git config user.name "AcreetionOS Flasher Bot"
          git config user.email "bot@acreetionos.org"
          git checkout -b "$BRANCH"
          git commit -m "Auto-fix: flasher test failures $(date +%Y-%m-%d)"
          git push origin "$BRANCH"
          gh pr create --title "Auto-fix: flasher $(date +%Y-%m-%d)" \
            --body "Auto-fixes from flasher testing" \
            --base main --head "$BRANCH" | gh pr merge --merge --auto
