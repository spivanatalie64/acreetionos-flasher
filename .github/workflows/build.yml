name: Build Flasher

on:
  schedule:
    - cron: '0 6 * * 1'
  push:
    tags: ['v*']
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            suffix: linux
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            suffix: win64
          - target: aarch64-apple-darwin
            os: macos-latest
            suffix: macos

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Generate latest editions
        run: node generate-editions.js

      - name: Install npm deps
        run: npm install

      - name: Build Tauri app
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
        run: npm run tauri build -- --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: acreetionos-flasher-${{ matrix.suffix }}-${{ github.sha }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/
          retention-days: 30

  release:
    needs: build
    if: github.event_name != 'push' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4

      - name: Determine tag and release name
        id: tags
        run: |
          if [[ "${{ github.ref }}" =~ ^refs/tags/v ]]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "name=AcreetionOS USB Flasher — ${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=build-${{ github.run_number }}" >> $GITHUB_OUTPUT
            echo "name=AcreetionOS USB Flasher — Build #${{ github.run_number }}" >> $GITHUB_OUTPUT
          fi

      - name: Delete existing release if any
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "${{ steps.tags.outputs.tag }}" --yes 2>/dev/null || true
          git push origin --delete "${{ steps.tags.outputs.tag }}" 2>/dev/null || true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tags.outputs.tag }}
          name: ${{ steps.tags.outputs.name }}
          body: |
            Automated build of the AcreetionOS USB Flasher.

            **Editions included:** Cinnamon, XL, 32-bit, Hyprland, Plasma, MATE, GNOME, XFCE, Sway, i3

            ## Downloads
            - **Windows** — `.exe` installer
            - **macOS** — `.dmg` (Apple Silicon)
            - **Linux** — `.AppImage`, `.deb`, `.rpm`
          files: |
            **/*.AppImage
            **/*.deb
            **/*.dmg
            **/*.exe
          token: ${{ secrets.GITHUB_TOKEN }}
